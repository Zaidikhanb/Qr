<!DOCTYPE html>
<html>
<head>
  <title>Employee Attendance with QR Scanner</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    h1 { color: #333; text-align:center; }
    .employee-list { max-width: 500px; margin: auto; }
    .employee-card {
      background: white; padding: 15px; margin: 10px 0; border-radius: 8px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .role-tag {
      background: #007bff; color: white; padding: 3px 8px; border-radius: 12px;
      font-size: 0.8em;
    }
    button {
      padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer;
      font-weight: bold; margin-left: 5px;
    }
    .present { background: #28a745; color: white; }
    .absent { background: #dc3545; color: white; }
    .message { text-align: center; color: green; margin: 10px; }

    /* QR scanner styles */
    .scanner-container {
      max-width: 500px;
      margin: 20px auto;
      text-align: center;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    #video {
      width: 100%;
      max-width: 400px;
      border-radius: 8px;
      display: none;
      margin: 10px auto;
    }
    #scan-btn {
      background: #6c757d;
      color: white;
      padding: 10px 20px;
      font-size: 1em;
      margin-bottom: 10px;
    }
    #scan-btn.scanning {
      background: #dc3545;
    }
    #qr-result {
      margin-top: 10px;
      font-weight: bold;
      min-height: 24px;
    }
  </style>
  <!-- QR code decoding library -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
  <h1>📷 Mark Attendance via QR</h1>

  <!-- QR Scanner Section -->
  <div class="scanner-container">
    <button id="scan-btn">▶ Start QR Scanner</button>
    <video id="video" playsinline></video>
    <div id="qr-result"></div>
  </div>

  <!-- Employee list (manual marking) -->
  <h1 style="text-align:center;">or Manual Entry</h1>
  <div id="employeeList" class="employee-list"></div>
  <div id="message" class="message"></div>

  <script>
    // Global variables
    let employeesList = [];               // stores all employees fetched from API
    let scanning = false;
    let videoElement = document.getElementById('video');
    let scanBtn = document.getElementById('scan-btn');
    let qrResultDiv = document.getElementById('qr-result');
    let stream = null;
    let animationFrame = null;

    // Fetch employees from API and store globally
    async function fetchEmployees() {
      try {
        const res = await fetch('/api/employees');
        const employees = await res.json();
        employeesList = employees;         // store for QR lookup
        const list = document.getElementById('employeeList');
        list.innerHTML = employees.map(emp => `
          <div class="employee-card">
            <div>
              <strong>${emp.name}</strong> 
              <span class="role-tag">${emp.role}</span>
            </div>
            <div>
              <button class="present" onclick="markAttendance('${emp._id}', 'present')">Present</button>
              <button class="absent" onclick="markAttendance('${emp._id}', 'absent')">Absent</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error fetching employees:', error);
      }
    }

    // Mark attendance (existing function)
    async function markAttendance(employeeId, status) {
      try {
        const res = await fetch('/api/attendance', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employeeId, status })
        });
        if (res.ok) {
          document.getElementById('message').innerText = `✅ Marked ${status} successfully!`;
          setTimeout(() => document.getElementById('message').innerText = '', 2000);
        } else {
          alert('Error marking attendance');
        }
      } catch (error) {
        alert('Network error');
      }
    }

    // ---------- QR SCANNER LOGIC ----------
    // Stop camera and scanning
    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }
      videoElement.style.display = 'none';
      scanning = false;
      scanBtn.textContent = '▶ Start QR Scanner';
      scanBtn.classList.remove('scanning');
    }

    // Start camera and scanning
    async function startScanner() {
      try {
        // Request camera
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        videoElement.srcObject = stream;
        videoElement.setAttribute('playsinline', true); // for iOS
        videoElement.style.display = 'block';
        videoElement.play();
        scanning = true;
        scanBtn.textContent = '⏹ Stop Scanner';
        scanBtn.classList.add('scanning');
        qrResultDiv.textContent = ''; // clear previous result

        // Create a hidden canvas for frame capture
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');

        // Scan loop
        function scanFrame() {
          if (!scanning || videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
            animationFrame = requestAnimationFrame(scanFrame);
            return;
          }

          // Set canvas size to video size
          canvas.width = videoElement.videoWidth;
          canvas.height = videoElement.videoHeight;
          context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

          // Get image data and try to decode QR
          const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, canvas.width, canvas.height, {
            inversionAttempts: 'dontInvert'
          });

          if (code) {
            // Found a QR code
            const qrName = code.data.trim();
            stopCamera(); // stop scanning immediately
            processScannedName(qrName);
          } else {
            // Continue scanning
            animationFrame = requestAnimationFrame(scanFrame);
          }
        }

        // Start the loop
        animationFrame = requestAnimationFrame(scanFrame);
      } catch (err) {
        alert('Unable to access camera: ' + err.message);
        stopCamera();
      }
    }

    // Process the scanned name
    function processScannedName(scannedName) {
      if (!scannedName) {
        qrResultDiv.textContent = '⚠️ QR code contains no text.';
        return;
      }

      // Find employee by name (case-insensitive, trim)
      const matchedEmployee = employeesList.find(emp => 
        emp.name.trim().toLowerCase() === scannedName.toLowerCase()
      );

      if (matchedEmployee) {
        // Employee found – mark attendance as Present automatically
        markAttendance(matchedEmployee._id, 'present');
        qrResultDiv.textContent = `✅ ${matchedEmployee.name} marked present.`;
      } else {
        // Not an employee – show friendly message
        qrResultDiv.textContent = `Hello Mr. ${scannedName}, you are not allowed to add attendance.`;
      }
    }

    // Toggle scanner on button click
    scanBtn.addEventListener('click', () => {
      if (scanning) {
        stopCamera();
      } else {
        startScanner();
      }
    });

    // Initialize employees list on page load
    fetchEmployees();

    // Optional: Clean up camera if page unloads
    window.addEventListener('beforeunload', () => {
      stopCamera();
    });
  </script>
</body>
  </html>
