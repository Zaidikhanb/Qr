<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zaiqa Mahal · QR attendance</title>
  <!-- jsQR library -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0f16;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }

    /* main title – exactly "Zaiqa Mahal" only */
    .elegant-title {
      font-size: 2.8rem;
      font-weight: 500;
      letter-spacing: 2px;
      color: #f5e7c8;
      text-shadow: 0 4px 15px rgba(230, 180, 80, 0.3), 0 0 0 1px #c9a44b inset;
      margin-bottom: 1.2rem;
      text-align: center;
      font-family: 'Times New Roman', 'Playfair Display', serif;
      word-break: keep-all;
      border-bottom: 1px solid #c9a44b40;
      padding-bottom: 0.5rem;
      width: fit-content;
      max-width: 90vw;
    }

    /* square scanner card */
    .scanner-square {
      background: #1e1e2a;
      border-radius: 2.5rem;
      padding: 1.8rem 1.8rem 2rem 1.8rem;
      box-shadow: 0 25px 40px -10px black, 0 0 0 2px #3e362e, 0 0 0 5px #0e0c14;
      max-width: 460px;
      width: 100%;
      margin: 0 auto;
    }

    /* camera container – exactly square */
    .camera-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;               /* perfect square */
      border-radius: 1.8rem;
      overflow: hidden;
      background: #0a0a10;
      box-shadow: inset 0 0 30px #00000099, 0 10px 20px #00000060;
      border: 3px solid #b2925a;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;                  /* fills square, may crop slightly – fine for scan */
      display: block;
      background: black;
      transform: scaleX(1);                /* ensure no mirror (environment mode already natural) */
    }

    /* scanning overlay: moving line + golden corners */
    .scan-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 1.6rem;
      box-shadow: 0 0 0 2px #dbb45880 inset, 0 0 15px #e3b154;
    }

    /* smooth moving scan line */
    .scan-line {
      position: absolute;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, transparent, #fcd34d, #fbbf24, #fcd34d, transparent);
      filter: drop-shadow(0 0 8px #fbbf24);
      animation: scanMove 2.2s ease-in-out infinite;
      border-radius: 2px;
      opacity: 0.9;
    }

    @keyframes scanMove {
      0% { top: 5%; }
      25% { top: 30%; }
      50% { top: 70%; }
      75% { top: 40%; }
      100% { top: 5%; }
    }

    /* corner brackets for premium look */
    .corner-tl, .corner-tr, .corner-bl, .corner-br {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #f7e3b1;
      border-style: solid;
      border-width: 0;
      filter: drop-shadow(0 0 6px #f3cd81);
    }
    .corner-tl { left: 12px; top: 12px; border-left-width: 4px; border-top-width: 4px; border-radius: 20px 0 0 0; }
    .corner-tr { right: 12px; top: 12px; border-right-width: 4px; border-top-width: 4px; border-radius: 0 20px 0 0; }
    .corner-bl { left: 12px; bottom: 12px; border-left-width: 4px; border-bottom-width: 4px; border-radius: 0 0 0 20px; }
    .corner-br { right: 12px; bottom: 12px; border-right-width: 4px; border-bottom-width: 4px; border-radius: 0 0 20px 0; }

    /* feedback area – minimal, shows welcome and scan status */
    .scan-feedback {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 400;
      min-height: 2.8rem;
      color: #ead3a5;
      background: #2b2532;
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      letter-spacing: 0.3px;
      border: 1px solid #9f884c;
      box-shadow: inset 0 1px 5px #00000055;
      backdrop-filter: blur(2px);
      word-break: break-word;
    }

    .scan-feedback.success {
      color: #bcf0b4;
      border-color: #8bc34a;
    }
    .scan-feedback.warning {
      color: #ffcf9a;
      border-color: #e6a345;
    }

    /* hidden elements – no extra text, no footer */
    .hidden {
      display: none;
    }

    /* no footer, no extra span – only title and scanner */
  </style>
</head>
<body>
  <!-- clean title: exactly "Zaiqa Mahal" -->
  <h1 class="elegant-title">Zaiqa Mahal</h1>

  <!-- main square scanner -->
  <div class="scanner-square">
    <div class="camera-frame">
      <video id="video" playsinline autoplay muted></video>
      <!-- smooth scanning animations -->
      <div class="scan-overlay">
        <div class="scan-line"></div>
        <div class="corner-tl"></div>
        <div class="corner-tr"></div>
        <div class="corner-bl"></div>
        <div class="corner-br"></div>
      </div>
    </div>
    <!-- feedback area: welcome note appears here, also scan results -->
    <div id="qr-result" class="scan-feedback">✨ welcome to Zaiqa Mahal</div>
  </div>

  <script>
    (function() {
      // ---------- GLOBALS ----------
      let employeesList = [];               // all employees from API
      let scanning = true;                  // always on
      const videoElement = document.getElementById('video');
      const qrResultDiv = document.getElementById('qr-result');
      let stream = null;
      let animationFrame = null;

      // Cooldown to avoid double-marking same QR within 4 seconds
      let lastScannedName = '';
      let lastScannedTime = 0;
      const COOLDOWN_MS = 4000;

      // ---------- AUDIO BEEP (web audio, no files) ----------
      let audioContext = null;

      async function getAudioContext() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
          try {
            await audioContext.resume();
          } catch (e) {
            console.warn('Audio resume failed', e);
          }
        }
        return audioContext;
      }

      async function beepSuccess() {
        try {
          const ctx = await getAudioContext();
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = 880;        // pleasant high beep
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.18);
        } catch (e) {
          console.warn('beepSuccess error', e);
        }
      }

      async function beepFailure() {
        try {
          const ctx = await getAudioContext();
          const now = ctx.currentTime;
          // three short, lower-pitch beeps with gaps
          for (let i = 0; i < 3; i++) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 440;       // lower pitch for failure
            const startTime = now + i * 0.25;
            gain.gain.setValueAtTime(0.1, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.12);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(startTime);
            osc.stop(startTime + 0.12);
          }
        } catch (e) {
          console.warn('beepFailure error', e);
        }
      }

      // ---------- FETCH EMPLOYEES (silent, then welcome) ----------
      async function fetchEmployees() {
        try {
          const res = await fetch('/api/employees');
          const employees = await res.json();
          employeesList = employees;
          // welcome note inside feedback
          qrResultDiv.textContent = `👋 Welcome, Zaiqa Mahal · ${employees.length} staff`;
        } catch (error) {
          console.error('fetch error', error);
          qrResultDiv.textContent = '⚠️ Welcome · staff list unavailable';
        }
      }

      // ---------- MARK ATTENDANCE (with beep feedback) ----------
      async function markAttendance(employeeId, status, employeeName) {
        try {
          const res = await fetch('/api/attendance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ employeeId, status })
          });
          if (res.ok) {
            qrResultDiv.textContent = `✅ ${employeeName} marked ${status}`;
            qrResultDiv.classList.add('success');
            beepSuccess();   // single success beep
            setTimeout(() => qrResultDiv.classList.remove('success'), 1500);
          } else {
            const errText = await res.text();
            qrResultDiv.textContent = `❌ error: ${errText.substring(0, 30)}`;
            qrResultDiv.classList.add('warning');
            beepFailure();   // three failure beeps
            setTimeout(() => qrResultDiv.classList.remove('warning'), 2000);
          }
        } catch (error) {
          qrResultDiv.textContent = `📡 network error - try again`;
          qrResultDiv.classList.add('warning');
          beepFailure();     // three failure beeps
          setTimeout(() => qrResultDiv.classList.remove('warning'), 2000);
        }
      }

      // ---------- PROCESS SCANNED NAME (with cooldown & beeps) ----------
      function processScannedName(scannedName) {
        if (!scannedName || scannedName.trim() === '') {
          qrResultDiv.textContent = '⚠️ empty QR code';
          beepFailure();     // empty is failure
          return;
        }

        const trimmed = scannedName.trim();
        const now = Date.now();

        // cooldown: same name within 4s – no beep (just notify)
        if (trimmed === lastScannedName && (now - lastScannedTime) < COOLDOWN_MS) {
          qrResultDiv.textContent = `⏱️ ${trimmed} already scanned (cooldown)`;
          return;
        }

        // find employee by name (case‑insensitive)
        const matched = employeesList.find(emp => 
          emp.name.trim().toLowerCase() === trimmed.toLowerCase()
        );

        if (matched) {
          // mark present – success beep will happen inside markAttendance on OK
          markAttendance(matched._id, 'present', matched.name);
          lastScannedName = trimmed;
          lastScannedTime = now;
        } else {
          // not an employee -> failure three beeps
          qrResultDiv.textContent = `👤 Hello ${trimmed}, not in staff list`;
          qrResultDiv.classList.add('warning');
          beepFailure();     // three beeps for unknown person
          setTimeout(() => qrResultDiv.classList.remove('warning'), 2000);
          // update lastScanned to avoid spamming same unknown name
          lastScannedName = trimmed;
          lastScannedTime = now;
        }
      }

      // ---------- SCANNER LOOP (always on) ----------
      function startScanner() {
        // Request rear camera, environment (no mirror)
        navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } } 
        })
        .then((mediaStream) => {
          stream = mediaStream;
          videoElement.srcObject = stream;
          videoElement.setAttribute('playsinline', 'true');
          
          // Canvas for frame capture (hidden)
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');

          function scanLoop() {
            if (!scanning) return;

            if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
              canvas.width = videoElement.videoWidth;
              canvas.height = videoElement.videoHeight;

              if (canvas.width > 0 && canvas.height > 0) {
                context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                try {
                  const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                  const code = jsQR(imageData.data, canvas.width, canvas.height, {
                    inversionAttempts: 'dontInvert'
                  });

                  if (code) {
                    // QR detected – process without stopping camera
                    processScannedName(code.data);
                  }
                } catch (e) {
                  // ignore canvas read errors
                }
              }
            }
            animationFrame = requestAnimationFrame(scanLoop);
          }

          animationFrame = requestAnimationFrame(scanLoop);
          qrResultDiv.textContent = '🔍 camera active · scanning';
        })
        .catch((err) => {
          qrResultDiv.textContent = '📵 camera access denied';
          console.warn('Camera error:', err);
        });
      }

      // Cleanup on page unload
      function stopScanner() {
        scanning = false;
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
          animationFrame = null;
        }
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
        if (audioContext) {
          audioContext.close();
        }
      }

      // ---------- INITIALISE ----------
      // fetch employees, then start camera after a tiny delay
      fetchEmployees().then(() => {
        setTimeout(() => {
          startScanner();
        }, 120);
      });

      window.addEventListener('beforeunload', () => {
        stopScanner();
      });

      videoElement.addEventListener('loadedmetadata', () => {
        videoElement.play().catch(e => console.warn('play failed', e));
      });

      // no extra buttons or lists – just the scanner
    })();
  </script>
</body>
        </html>
